name: 컴퓨존 가격 수집

on:
  # 매일 한국시간 오전 9시 (UTC 00:00), 오후 2시 (UTC 05:00)
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 5 * * *'
  # GitHub 웹에서 수동으로도 실행 가능
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 크롤링 실행
        run: python crawler.py

      - name: 데이터 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          # 변경사항 있을 때만 커밋
          git diff --staged --quiet || git commit -m "🤖 가격 업데이트: $(date '+%Y-%m-%d %H:%M') KST"
          git push
